version: '3.8'

x-spark-common: &spark-common
  image: bitnami/spark:3.5
  volumes:
    - ./consumers:/opt/bitnami/spark/jobs
    - ./config:/opt/bitnami/spark/config
  networks:
    - smart-city-net

services:

  # ─────────────────────────────────────────────
  #  Zookeeper
  # ─────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    hostname: zookeeper
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smart-city-net

  # ─────────────────────────────────────────────
  #  Kafka Broker
  # ─────────────────────────────────────────────
  broker:
    image: confluentinc/cp-kafka:7.4.0
    hostname: broker
    container_name: broker
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - smart-city-net

  # ─────────────────────────────────────────────
  #  Kafka Topic Initialiser (one-shot)
  # ─────────────────────────────────────────────
  kafka-init:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      broker:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "
      kafka-topics --bootstrap-server broker:29092 --create --if-not-exists --topic vehicle_data    --partitions 3 --replication-factor 1 &&
      kafka-topics --bootstrap-server broker:29092 --create --if-not-exists --topic gps_data        --partitions 3 --replication-factor 1 &&
      kafka-topics --bootstrap-server broker:29092 --create --if-not-exists --topic weather_data    --partitions 3 --replication-factor 1 &&
      kafka-topics --bootstrap-server broker:29092 --create --if-not-exists --topic telemetry_data  --partitions 3 --replication-factor 1 &&
      kafka-topics --bootstrap-server broker:29092 --create --if-not-exists --topic emergency_data  --partitions 3 --replication-factor 1 &&
      echo 'All topics created.'
      "
    networks:
      - smart-city-net

  # ─────────────────────────────────────────────
  #  Spark Master
  # ─────────────────────────────────────────────
  spark-master:
    <<: *spark-common
    container_name: spark-master
    command: bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "9090:8080"   # Spark Web UI
      - "7077:7077"   # Cluster port
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no

  # ─────────────────────────────────────────────
  #  Spark Worker 1
  # ─────────────────────────────────────────────
  spark-worker-1:
    <<: *spark-common
    container_name: spark-worker-1
    command: bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    depends_on:
      - spark-master
    ports:
      - "9091:8081"
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no

  # ─────────────────────────────────────────────
  #  Spark Worker 2
  # ─────────────────────────────────────────────
  spark-worker-2:
    <<: *spark-common
    container_name: spark-worker-2
    command: bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    depends_on:
      - spark-master
    ports:
      - "9093:8081"
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no

# ─────────────────────────────────────────────
#  Networking & Volumes
# ─────────────────────────────────────────────
networks:
  smart-city-net:
    driver: bridge

volumes:
  kafka_data:
    driver: local
